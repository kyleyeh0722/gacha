<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲抽卡系統</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 登入與註冊視窗 -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2>登入 / 註冊</h2>
            <div class="input-group">
                <label for="username-input">使用者名稱</label>
                <input type="text" id="username-input" placeholder="請輸入帳號" />
            </div>
            <div class="input-group">
                <label for="password-input">密碼</label>
                <input type="password" id="password-input" placeholder="請輸入密碼" />
            </div>
            <div class="auth-buttons">
                <button id="btn-login" class="btn primary">登入</button>
                <button id="btn-register" class="btn secondary">註冊</button>
            </div>
            <p id="auth-message" class="auth-message"></p>
        </div>
    </div>

    <div class="container" id="app-content" style="display: none;">
        <header>
            <h1>遊戲抽卡系統</h1>
            <div class="user-info">
                <span>玩家: <strong id="username">-</strong></span>
                <span>寶石: <strong id="gems">-</strong></span>
                <button id="btn-logout" class="btn secondary small">登出</button>
            </div>
        </header>

        <main>
            <section class="gacha-section">
                <h2>進行抽卡</h2>
                <div class="gacha-buttons">
                    <button id="btn-single-pull" class="btn primary">單抽 (200 寶石)</button>
                    <button id="btn-ten-pull" class="btn primary ten">十連抽 (2000 寶石)</button>
                </div>
                <div id="gacha-results" class="results-container">
                    <!-- 抽卡結果會在這裡顯示 -->
                </div>
            </section>

            <div class="split-view">
                <section class="inventory-section">
                    <h2>卡片倉庫</h2>
                    <div id="inventory-grid" class="inventory-grid">
                        <!-- 卡片倉庫列表 -->
                    </div>
                </section>

                <section class="history-section">
                    <h2>抽卡紀錄</h2>
                    <ul id="history-list" class="history-list">
                        <!-- 歷史紀錄 -->
                    </ul>
                </section>
            </div>
        </main>
    </div>

    <!-- 卡牌放大檢視視窗 -->
    <div id="card-modal" class="card-modal" style="display: none;">
        <div class="card-modal-content">
            <span id="card-modal-close" class="card-modal-close">&times;</span>
            <div id="card-modal-inner" class="card-large">
                <!-- 內容動態插入 -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
